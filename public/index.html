<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="index, follow"/>
  <title>GLŌW — Magdalena</title>
  <meta name="description" content="Magdalena — wellness & lifestyle."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: #FAF7F2;
      color: #1C1C1C;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; }

    /* ── NAVBAR ── */
    .navbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 20px 24px;
    }

    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: #ffffff;
      text-shadow: 0 1px 12px rgba(0,0,0,0.4);
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* dark gradient overlay — bottom up */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.62) 0%,
        rgba(0,0,0,0.18) 45%,
        transparent 70%
      );
    }

    .hero-copy {
      position: absolute;
      bottom: 20%;
      left: 0; right: 0;
      text-align: center;
      padding: 0 20px;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(40px, 10vw, 80px);
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .hero-sub {
      margin-top: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    /* ── INSTAGRAM BAR ── */
    .ig-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px;
      background: #FAF7F2;
      border-bottom: 1px solid #C9A96E;
      transition: opacity 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ig-bar:hover { opacity: 0.75; }

    .ig-bar svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: #C9A96E;
    }

    .ig-handle {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #1C1C1C;
      letter-spacing: 0.01em;
    }

    /* ── GALLERY ── */
    .gallery {
      display: grid;
      gap: 3px;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── MOBILE (< 768px): 2-col edge-to-edge ── */
    @media (max-width: 767px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      /* photo-1: full-width editorial opener */
      .gallery .p1 {
        grid-column: 1 / -1;
        aspect-ratio: 3 / 2;
      }

      /* rest: 4:5 portrait */
      .gallery .p2,
      .gallery .p3,
      .gallery .p4,
      .gallery .p5 {
        aspect-ratio: 4 / 5;
      }

      /* photo-5 last — if odd number, span full width for clean end */
      .gallery .p5 {
        grid-column: 1 / -1;
        aspect-ratio: 3 / 2;
      }
    }

    /* ── DESKTOP (>= 768px): 3-col asymmetric ── */
    @media (min-width: 768px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }

      /* row 1: photo-1 and photo-2 side by side (2fr), photo-3 stacked */
      .gallery .p1 {
        grid-column: 1 / 3;
        aspect-ratio: 4 / 3;
      }

      .gallery .p2 {
        grid-column: 3 / 4;
        aspect-ratio: 4 / 3;
      }

      /* row 2: photo-3 full width */
      .gallery .p3 {
        grid-column: 1 / -1;
        aspect-ratio: 16 / 5;
      }

      /* row 3: photo-4 and photo-5 side by side */
      .gallery .p4,
      .gallery .p5 {
        aspect-ratio: 4 / 3;
      }
    }

    /* ── FOOTER ── */
    footer {
      padding: 32px 16px;
      text-align: center;
      border-top: 1px solid #E8D5C4;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #888888;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <span class="navbar-brand">GLŌW</span>
  </header>

  <!-- HERO VIDEO -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline preload="auto">
      <source src="hero.mp4" type="video/mp4"/>
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-copy">
      <h1 class="hero-name">Magdalena</h1>
      <p class="hero-sub">wellness &amp; lifestyle</p>
    </div>
  </section>

  <!-- INSTAGRAM BAR -->
  <a class="ig-bar" href="https://www.instagram.com/_magzi?igsh=MzViYmhzMzg3dmlz&utm_source=qr" target="_blank" rel="noopener" aria-label="Follow @_magzi on Instagram">
    <!-- Official Instagram glyph -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
      <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
    </svg>
    <span class="ig-handle">@_magzi</span>
  </a>

  <!-- PHOTO GALLERY -->
  <main class="gallery" aria-label="Photography">
    <div class="p1"><img src="photo-1.jpg" alt="" loading="eager"/></div>
    <div class="p2"><img src="photo-2.jpg" alt="" loading="lazy"/></div>
    <div class="p3"><img src="photo-3.jpg" alt="" loading="lazy"/></div>
    <div class="p4"><img src="photo-4.jpg" alt="" loading="lazy"/></div>
    <div class="p5"><img src="photo-5.jpg" alt="" loading="lazy"/></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 GLŌW · Wellness &amp; Lifestyle · 18+</p>
  </footer>

</body>
</html>
