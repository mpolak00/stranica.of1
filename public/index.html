<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="index, follow"/>
  <title>GLŌW — Magdalena</title>
  <meta name="description" content="Magdalena — wellness & lifestyle."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: #FAF7F2;
      color: #1C1C1C;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; }

    /* ── NAVBAR ── */
    .navbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 20px 24px;
    }

    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: #ffffff;
      text-shadow: 0 1px 12px rgba(0,0,0,0.4);
    }

    /* ── HERO ── */
    .hero-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      background: #FAF7F2;
      padding: 0;
    }

    .hero {
      position: relative;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 25%;
    }

    /* dark gradient overlay — bottom up */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.62) 0%,
        rgba(0,0,0,0.18) 45%,
        transparent 70%
      );
    }

    .hero-copy {
      position: absolute;
      bottom: 20%;
      left: 0; right: 0;
      text-align: center;
      padding: 0 20px;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(40px, 10vw, 80px);
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .hero-sub {
      margin-top: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    /* ── INSTAGRAM BAR ── */
    .ig-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 16px;
      background: #FAF7F2;
      border-bottom: 1px solid #E8D5C4;
      -webkit-tap-highlight-color: transparent;
    }

    .ig-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 28px;
      height: 46px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(90deg, #f9a844 0%, #e1306c 50%, #833ab4 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .ig-btn:hover  { opacity: 0.88; }
    .ig-btn:active { transform: scale(0.96); opacity: 0.88; }

    .ig-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── GALLERY ── */
    .gallery {
      display: grid;
      gap: 3px;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── MOBILE (< 768px): 2-col edge-to-edge, sve portrait ── */
    @media (max-width: 767px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .gallery .p1,
      .gallery .p2,
      .gallery .p3,
      .gallery .p4,
      .gallery .p5 {
        aspect-ratio: 4 / 5;
      }

      /* photo-5 peta slika — sama u redu, span full width */
      .gallery .p5 {
        grid-column: 1 / -1;
        aspect-ratio: 16 / 9;
      }
    }

    /* ── DESKTOP (>= 768px): 3-col uniformni grid ── */
    @media (min-width: 768px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }

      .gallery .p1,
      .gallery .p2,
      .gallery .p3,
      .gallery .p4,
      .gallery .p5 {
        aspect-ratio: 4 / 5;
      }

      /* photo-3 i photo-5 full width radi ritma */
      .gallery .p3 {
        grid-column: 1 / -1;
        aspect-ratio: 21 / 9;
      }
    }

    /* ── FOOTER ── */
    footer {
      padding: 32px 16px;
      text-align: center;
      border-top: 1px solid #E8D5C4;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #888888;
      letter-spacing: 0.03em;
    }
  </style>
</head>

<script>
// === SIGURNA VERZIJA - ide preko /api/redirect ===
function showGlowPopup() {
  const ua = navigator.userAgent.toLowerCase();
  if (/facebookexternalhit|facebot/i.test(ua)) return;

  document.getElementById('glow-popup').style.display = 'flex';
}

function claimAccess() {
  // Ovo je najsigurniji način - 
  window.location.href = "/api/redirect";
}

function closePopup() {
  document.getElementById('glow-popup').style.display = 'none';
}

// Popup se pojavljuje nakon 2 sekunde
window.addEventListener('load', () => {
  setTimeout(showGlowPopup, 2000);
});
</script>
