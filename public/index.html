<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="index, follow"/>
  <title>GLŌW — Wellness &amp; Lifestyle</title>
  <meta name="description" content="Magdalena — wellness &amp; lifestyle. Exclusive content for members."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --off-white: #fafaf9;
      --ink:     #111111;
      --muted:   #888888;
      --faint:   #aaaaaa;
      --accent:  #c9a96e;
      --border:  #e8e4e0;
    }

    html, body { height: 100%; }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── NAV ── */
    .nav {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
      z-index: 10;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    .nav-join {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0 20px;
      height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-join:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ── HERO ── */
    .hero-wrap {
      position: relative;
      width: 100%;
    }

    .hero-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 80vh;
      background: linear-gradient(135deg, #e8d5c4 0%, #d4b8a8 100%);
      overflow: hidden;
    }

    .hero-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-caption {
      position: absolute;
      bottom: 32px;
      left: 40px;
    }

    .hero-caption h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(22px, 3.5vw, 42px);
      line-height: 1.15;
      letter-spacing: 0.01em;
      color: #ffffff;
      text-shadow: 0 1px 16px rgba(0,0,0,0.28);
    }

    /* ── PHOTO GRID ── */
    .grid-section {
      padding: 64px 40px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .photo-item {
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .photo-item > div,
    .photo-item > img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* Warm placeholder gradients */
    .ph-1 { background: linear-gradient(135deg, #e8d5c4 0%, #c9a96e 100%); }
    .ph-2 { background: linear-gradient(145deg, #ddc8b8 0%, #c4a892 100%); }
    .ph-3 { background: linear-gradient(125deg, #e2d0c0 0%, #ccb59e 100%); }
    .ph-4 { background: linear-gradient(155deg, #d8c4b0 0%, #c8a98a 100%); }
    .ph-5 { background: linear-gradient(130deg, #e4d2c4 0%, #d2b8a8 100%); }
    .ph-6 { background: linear-gradient(140deg, #dbc8b8 0%, #c9b09e 100%); }

    /* ── CTA ── */
    .cta-section {
      padding: 48px 40px 72px;
      text-align: center;
    }

    .cta-rule {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 auto 40px;
      max-width: 480px;
    }

    .cta-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(19px, 2.5vw, 28px);
      color: var(--ink);
      margin-bottom: 28px;
      letter-spacing: 0.01em;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 32px;
      min-height: 44px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .cta-btn:hover {
      background: var(--ink);
      color: var(--white);
    }

    /* ── FOOTER ── */
    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--faint);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 767px) {
      .nav { padding: 0 20px; }
      .hero-caption { left: 20px; bottom: 20px; }
      .grid-section { padding: 40px 20px; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .cta-section { padding: 40px 20px 56px; }
      footer { padding: 20px; }
    }

    @media (max-width: 374px) {
      .photo-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .nav { padding: 0 32px; }
      .grid-section { padding: 48px 32px; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .cta-section { padding: 44px 32px 60px; }
      footer { padding: 20px 32px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" aria-label="Main navigation">
    <a href="/" class="nav-brand">GLŌW</a>
    <a href="/access" id="access-link" class="nav-join">Join</a>
  </nav>

  <!-- HERO -->
  <section class="hero-wrap" aria-label="Hero">
    <div class="hero-img">
      <!-- REPLACE: <img src="hero.jpg" alt=""> -->
    </div>
    <div class="hero-caption">
      <h1>Magdalena — wellness &amp; lifestyle</h1>
    </div>
  </section>

  <!-- PHOTO GRID -->
  <section class="grid-section" aria-label="Photography">
    <div class="photo-grid">

      <div class="photo-item">
        <div class="ph-1"><!-- REPLACE with <img src="photo-1.jpg"> --></div>
      </div>

      <div class="photo-item">
        <div class="ph-2"><!-- REPLACE with <img src="photo-2.jpg"> --></div>
      </div>

      <div class="photo-item">
        <div class="ph-3"><!-- REPLACE with <img src="photo-3.jpg"> --></div>
      </div>

      <div class="photo-item">
        <div class="ph-4"><!-- REPLACE with <img src="photo-4.jpg"> --></div>
      </div>

      <div class="photo-item">
        <div class="ph-5"><!-- REPLACE with <img src="photo-5.jpg"> --></div>
      </div>

      <div class="photo-item">
        <div class="ph-6"><!-- REPLACE with <img src="photo-6.jpg"> --></div>
      </div>

    </div>
  </section>

  <!-- CTA -->
  <section class="cta-section" aria-label="Join">
    <hr class="cta-rule"/>
    <p class="cta-text">Exclusive content for members.</p>
    <a href="/access" id="join-btn" class="cta-btn">Join Free</a>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 GLŌW · Wellness &amp; Lifestyle · 18+</p>
  </footer>

  <script>
    const search = window.location.search || '';
    document.querySelectorAll('#access-link, #join-btn').forEach(el => {
      el.href = '/access' + search;
    });
  </script>

</body>
</html>
