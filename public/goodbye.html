      *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;font-family:var(--font-body);background:radial-gradient(circle at top,rgba(212,84,122,.08),transparent 35%),var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}*:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:10px}

  <body>
    <main class="card">
      <div class="brand">GL<span>Ō</span>W</div>
      <h1>You're leaving GLŌW</h1>
      <p>You are about to continue to an external site. Your access opens only after you confirm below.</p>
      <a id="continue-link" class="btn" href="#" target="_blank" rel="noopener noreferrer">Continue →</a>
      <div class="small">Your tracking parameters will stay attached so attribution remains clean.</div>
    </main>

    <script>
      const META_PIXEL_ID = 'YOUR_META_PIXEL_ID';
      const TIKTOK_PIXEL_ID = 'YOUR_TIKTOK_PIXEL_ID';

      const root = document.documentElement;
      root.setAttribute('data-theme', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      const qs = new URLSearchParams(location.search);
      const tracking = {
        fbclid: qs.get('fbclid') || '',
        ttclid: qs.get('ttclid') || '',
        utm_source: qs.get('utm_source') || '',
        utm_medium: qs.get('utm_medium') || '',
        utm_campaign: qs.get('utm_campaign') || '',
        utm_content: qs.get('utm_content') || '',
        utm_term: qs.get('utm_term') || '',
        ad_id: qs.get('ad_id') || '',
        adset_id: qs.get('adset_id') || '',
        campaign_id: qs.get('campaign_id') || ''
      };

      function genId(prefix) {
        return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      }

      function sendCapi(event, eventId) {
        const body = JSON.stringify({ event, event_id: eventId, ...tracking });
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob([body], { type: 'application/json' });
            navigator.sendBeacon('/api/capi', blob);
            return;
          }
        } catch (_) {}
        fetch('/api/capi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
          keepalive: true
        }).catch(() => {});
      }

      if (typeof fbq === 'function') fbq('init', META_PIXEL_ID);
      if (typeof ttq !== 'undefined' && typeof ttq.load === 'function') {
        ttq.load(TIKTOK_PIXEL_ID);
        ttq.page();
      }

      const continueLink = document.getElementById('continue-link');
      let destination = '';
      try {
        destination = decodeURIComponent(qs.get('dest') || '');
      } catch (_) {
        destination = qs.get('dest') || '';
      }

      try {
        const url = new URL(destination);
        Object.entries(tracking).forEach(([key, value]) => value && url.searchParams.set(key, value));
        const eventId = qs.get('event_id');
        if (eventId) url.searchParams.set('event_id', eventId);
        continueLink.href = url.toString();
      } catch (_) {
        continueLink.href = destination || '#';
      }

      continueLink.addEventListener('click', () => {
        const clickId = qs.get('event_id') || genId('click');
        if (typeof fbq === 'function') fbq('trackCustom', 'OutboundClick', { content_name: 'GLOW CTA' }, { eventID: clickId });
        if (typeof ttq !== 'undefined' && typeof ttq.track === 'function') ttq.track('ClickButton');
        sendCapi('OutboundClick', clickId);
      });
    </script>
