<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekskluzivni pristup</title>
  <style>
    :root { --accent: #00bfff; }   /* svijetlo plava kao na tvojoj promo stranici */
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f8ff; color: #111;
      min-height: 100vh; display: grid; place-items: center;
    }
    .card {
      background: white; 
      border-radius: 24px; 
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
      max-width: 420px; 
      width: 100%;
      text-align: center;
    }
    .gift { font-size: 48px; margin-bottom: 8px; }
    h1 { 
      margin: 0 0 8px; 
      font-size: 28px; 
      color: #111;
    }
    p { 
      color: #222; 
      line-height: 1.5; 
      margin: 0 0 24px; 
      font-size: 17px;
    }
    .btn {
      display: block; 
      width: 100%; 
      padding: 16px; 
      margin: 12px 0;
      background: linear-gradient(90deg, #00bfff, #ff00ff); /* plavo → roze (OF vibe) */
      color: white; 
      font-weight: bold;
      font-size: 18px; 
      border-radius: 50px; 
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,191,255,0.3);
    }
    .tips { 
      margin-top: 28px; 
      padding-top: 20px; 
      border-top: 1px solid #eee; 
      font-size: 14px; 
      color: #555; 
      text-align: left; 
    }
    .tip { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="gift">🎁</div>
    <h1>Ekskluzivni pristup</h1>
    <p>Dobivaš <strong>3 dana besplatnog pristupa</strong></p>
    
    <a href="/api/redirect?open_external=1" class="btn">Zatraži odmah →</a>
    
    <div class="tips">
      <div class="tip"><strong>Instagram / Facebook:</strong> Tap ⋯ (tri točkice) → Open in Browser</div>
      <div class="tip"><strong>Telegram:</strong> Tap ⋯ ili ikonu kompasa → Open in Browser</div>
    </div>
  </div>
</body>
</html>
